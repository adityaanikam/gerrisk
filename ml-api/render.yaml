# render.yaml — Render deployment manifest for the GeriRisk ML API
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy steps:
#   1. Push the ml-api/ directory to a GitHub repo (or the monorepo root).
#   2. In Render dashboard → "New Blueprint" → point to this render.yaml.
#   3. Set the ALLOWED_ORIGIN environment variable to your Vercel URL, e.g.:
#        https://geririsk.vercel.app
#      (Leave unset or set to "*" to allow all origins during development.)

services:
  - type: web
    name: geririsk-ml-api
    runtime: python
    region: oregon          # choose the region closest to your Vercel deployment
    plan: free              # upgrade to "starter" for always-on (no cold starts)

    # Render sets the rootDir relative to the repo root.
    # If this render.yaml is committed at the repo root, set rootDir to ml-api/.
    # If it is committed inside ml-api/ itself, remove the rootDir key.
    rootDir: ml-api

    buildCommand: pip install -r requirements.txt

    # Render injects $PORT automatically; uvicorn must bind to 0.0.0.0.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    # Health check — Render pings this path to confirm the service is up.
    healthCheckPath: /health

    envVars:
      # Optional: restrict CORS to your production Vercel domain.
      # Omit or set to "*" for open access during development / staging.
      - key: ALLOWED_ORIGIN
        value: "*"        # ← change to https://geririsk.vercel.app before going live

      # Python behaviour
      - key: PYTHONUNBUFFERED
        value: "1"        # ensures logs appear in real-time in Render dashboard
